  <text x="1520" y="960" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#14181c">Firmware assumptions</text>
  <text x="1345" y="995" font-family="Arial, sans-serif" font-size="18" fill="#14181c">- A4988 profile: EN low-active</text>
  <text x="1345" y="1025" font-family="Arial, sans-serif" font-size="18" fill="#14181c">- default steps/rev: 1600</text>
  <text x="1345" y="1055" font-family="Arial, sans-serif" font-size="18" fill="#14181c">- default wakeup: 1000us</text>
