<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <rect width="100%" height="100%" fill="#f6f1e7"/>
  <text x="900.0" y="44" font-family="Arial, sans-serif" font-size="36" text-anchor="middle" fill="#111827">STM32C031C6 + ULN2803A + DM556 Dual-Axis Wiring</text>
  <text x="900.0" y="84" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#64748b">Recommended bring-up: wire PUL/DIR first, ENA optional</text>
  <rect x="50" y="140" width="310" height="900" rx="18" fill="#fffdf8" stroke="#334155" stroke-width="3"/>
  <rect x="430" y="180" width="330" height="800" rx="18" fill="#fffaf2" stroke="#334155" stroke-width="3"/>
  <rect x="860" y="120" width="420" height="400" rx="18" fill="#fbfcff" stroke="#334155" stroke-width="3"/>
  <rect x="860" y="600" width="420" height="400" rx="18" fill="#fbfcff" stroke="#334155" stroke-width="3"/>
  <rect x="1390" y="120" width="340" height="400" rx="18" fill="#fcfff9" stroke="#334155" stroke-width="3"/>
  <rect x="1390" y="600" width="340" height="400" rx="18" fill="#fcfff9" stroke="#334155" stroke-width="3"/>
  <rect x="410" y="1025" width="370" height="125" rx="18" fill="#f7fbff" stroke="#334155" stroke-width="3"/>
  <rect x="840" y="1025" width="380" height="125" rx="18" fill="#fff8f3" stroke="#334155" stroke-width="3"/>
  <text x="66" y="176" font-family="Arial, sans-serif" font-size="24" fill="#182028">NUCLEO-C031C6</text>
  <text x="446" y="216" font-family="Arial, sans-serif" font-size="24" fill="#182028">ULN2803A Module</text>
  <text x="876" y="156" font-family="Arial, sans-serif" font-size="24" fill="#182028">DM556 #1 (PAN)</text>
  <text x="876" y="636" font-family="Arial, sans-serif" font-size="24" fill="#182028">DM556 #2 (TILT)</text>
  <text x="1406" y="156" font-family="Arial, sans-serif" font-size="24" fill="#182028">Motor #1 42BYGH34-401A</text>
  <text x="1406" y="636" font-family="Arial, sans-serif" font-size="24" fill="#182028">Motor #2 42BYGH34-401A</text>
  <text x="426" y="1061" font-family="Arial, sans-serif" font-size="24" fill="#182028">Logic 5V Supply</text>
  <text x="856" y="1061" font-family="Arial, sans-serif" font-size="24" fill="#182028">Motor Power Supply</text>
  <text x="75" y="190" font-family="Arial, sans-serif" font-size="18" fill="#64748b">VCP UART kept unchanged: USART2 PA2/PA3</text>
  <text x="75" y="225" font-family="Arial, sans-serif" font-size="20" fill="#111827">Axis M1</text>
  <text x="95" y="265" font-family="Arial, sans-serif" font-size="18" fill="#6b46c1">PA8  STEP</text>
  <text x="95" y="305" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">PA0  DIR</text>
  <text x="95" y="345" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">PA1  EN  (optional)</text>
  <text x="75" y="410" font-family="Arial, sans-serif" font-size="20" fill="#111827">Axis M2</text>
  <text x="95" y="450" font-family="Arial, sans-serif" font-size="18" fill="#6b46c1">PB4  STEP</text>
  <text x="95" y="490" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">PB0  DIR</text>
  <text x="95" y="530" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">PB1  EN  (optional)</text>
  <text x="75" y="610" font-family="Arial, sans-serif" font-size="20" fill="#111827">Shared logic</text>
  <text x="95" y="650" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">5V   -&gt; PUL+/DIR+/ENA+</text>
  <text x="95" y="690" font-family="Arial, sans-serif" font-size="18" fill="#111827">GND  -&gt; ULN GND and logic return</text>
  <text x="75" y="770" font-family="Arial, sans-serif" font-size="20" fill="#111827">Notes</text>
  <text x="95" y="810" font-family="Arial, sans-serif" font-size="15" fill="#64748b">1. Do not drive DM556 inputs directly from 3.3V GPIO</text>
  <text x="95" y="835" font-family="Arial, sans-serif" font-size="15" fill="#64748b">2. Use ULN2803A open-collector outputs</text>
  <text x="95" y="860" font-family="Arial, sans-serif" font-size="15" fill="#64748b">3. First test can leave ENA disconnected</text>
  <text x="95" y="885" font-family="Arial, sans-serif" font-size="15" fill="#64748b">4. Keep microstep = 1600 pulse/rev</text>
  <text x="450" y="220" font-family="Arial, sans-serif" font-size="20" fill="#182028">Inputs from STM32</text>
  <text x="450" y="600" font-family="Arial, sans-serif" font-size="20" fill="#182028">Open-collector outputs</text>
  <text x="450" y="935" font-family="Arial, sans-serif" font-size="15" fill="#64748b">VCC = 5V only if module needs it for LEDs</text>
  <text x="450" y="958" font-family="Arial, sans-serif" font-size="15" fill="#64748b">GND = common logic ground</text>
  <text x="450" y="981" font-family="Arial, sans-serif" font-size="15" fill="#64748b">COM = leave NC for DM556 logic interface</text>
  <text x="880" y="160" font-family="Arial, sans-serif" font-size="20" fill="#182028">Control side (common anode)</text>
  <text x="900" y="210" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">PUL+  -&gt; +5V</text>
  <text x="900" y="245" font-family="Arial, sans-serif" font-size="18" fill="#6b46c1">PUL-  &lt;- OUT1</text>
  <text x="900" y="280" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">DIR+  -&gt; +5V</text>
  <text x="900" y="315" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">DIR-  &lt;- OUT2</text>
  <text x="900" y="350" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">ENA+  -&gt; +5V  (optional)</text>
  <text x="900" y="385" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">ENA-  &lt;- OUT3 (optional)</text>
  <text x="880" y="435" font-family="Arial, sans-serif" font-size="20" fill="#182028">Power + motor side</text>
  <text x="900" y="475" font-family="Arial, sans-serif" font-size="18" fill="#d97706">+V   -&gt; 24VDC</text>
  <text x="900" y="505" font-family="Arial, sans-serif" font-size="18" fill="#111827">GND  -&gt; 24V return</text>
  <text x="880" y="640" font-family="Arial, sans-serif" font-size="20" fill="#182028">Control side (common anode)</text>
  <text x="900" y="690" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">PUL+  -&gt; +5V</text>
  <text x="900" y="725" font-family="Arial, sans-serif" font-size="18" fill="#6b46c1">PUL-  &lt;- OUT4</text>
  <text x="900" y="760" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">DIR+  -&gt; +5V</text>
  <text x="900" y="795" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">DIR-  &lt;- OUT5</text>
  <text x="900" y="830" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">ENA+  -&gt; +5V  (optional)</text>
  <text x="900" y="865" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">ENA-  &lt;- OUT6 (optional)</text>
  <text x="880" y="915" font-family="Arial, sans-serif" font-size="20" fill="#182028">Power + motor side</text>
  <text x="900" y="955" font-family="Arial, sans-serif" font-size="18" fill="#d97706">+V   -&gt; 24VDC</text>
  <text x="900" y="985" font-family="Arial, sans-serif" font-size="18" fill="#111827">GND  -&gt; 24V return</text>
  <text x="1410" y="170" font-family="Arial, sans-serif" font-size="20" fill="#182028">Measured winding groups:</text>
  <text x="1430" y="212" font-family="Arial, sans-serif" font-size="18" fill="#111827">Black + Red = one coil</text>
  <text x="1430" y="248" font-family="Arial, sans-serif" font-size="18" fill="#111827">Green + Blue = one coil</text>
  <text x="1410" y="300" font-family="Arial, sans-serif" font-size="20" fill="#182028">Driver terminal mapping:</text>
  <text x="1430" y="340" font-family="Arial, sans-serif" font-size="18" fill="#111827">A+ -&gt; Black</text>
  <text x="1430" y="375" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">A- -&gt; Red</text>
  <text x="1430" y="410" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">B+ -&gt; Green</text>
  <text x="1430" y="445" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">B- -&gt; Blue</text>
  <text x="1410" y="650" font-family="Arial, sans-serif" font-size="20" fill="#182028">Measured winding groups:</text>
  <text x="1430" y="692" font-family="Arial, sans-serif" font-size="18" fill="#111827">Black + Red = one coil</text>
  <text x="1430" y="728" font-family="Arial, sans-serif" font-size="18" fill="#111827">Green + Blue = one coil</text>
  <text x="1410" y="780" font-family="Arial, sans-serif" font-size="20" fill="#182028">Driver terminal mapping:</text>
  <text x="1430" y="820" font-family="Arial, sans-serif" font-size="18" fill="#111827">A+ -&gt; Black</text>
  <text x="1430" y="855" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">A- -&gt; Red</text>
  <text x="1430" y="890" font-family="Arial, sans-serif" font-size="18" fill="#c0392b">B+ -&gt; Green</text>
  <text x="1430" y="925" font-family="Arial, sans-serif" font-size="18" fill="#8b5a2b">B- -&gt; Blue</text>
  <line x1="250" y1="265" x2="455" y2="270" stroke="#6b46c1" stroke-width="4"/>
  <line x1="250" y1="305" x2="455" y2="315" stroke="#c0392b" stroke-width="4"/>
  <line x1="250" y1="345" x2="455" y2="360" stroke="#8b5a2b" stroke-width="4"/>
  <line x1="250" y1="450" x2="455" y2="435" stroke="#6b46c1" stroke-width="4"/>
  <line x1="250" y1="490" x2="455" y2="480" stroke="#c0392b" stroke-width="4"/>
  <line x1="250" y1="530" x2="455" y2="525" stroke="#8b5a2b" stroke-width="4"/>
  <line x1="250" y1="690" x2="455" y2="690" stroke="#111827" stroke-width="4"/>
  <line x1="455" y1="690" x2="455" y2="1100" stroke="#111827" stroke-width="3"/>
  <line x1="455" y1="1100" x2="620" y2="1100" stroke="#111827" stroke-width="3"/>
  <line x1="1080" y1="1105" x2="1080" y2="475" stroke="#d97706" stroke-width="4"/>
  <line x1="1080" y1="1105" x2="1080" y2="955" stroke="#d97706" stroke-width="4"/>
  <line x1="1140" y1="1105" x2="1140" y2="505" stroke="#111827" stroke-width="4"/>
  <line x1="1140" y1="1105" x2="1140" y2="985" stroke="#111827" stroke-width="4"/>
  <text x="900" y="1175" font-family="Arial, sans-serif" font-size="15" text-anchor="middle" fill="#64748b">Current firmware/GUI can be reused if DM556 microstep is kept at 1600 pulse/rev; ENA can be added later.</text>
</svg>